name: "Challenge 15: Meet the Agents"
description: Discover accessibility agents, run one, and read one agent's instructions.
title: "Challenge 15: Meet the Agents (@{username})"
labels: ["challenge", "day-2"]
body:
  - type: markdown
    attributes:
      value: |
        ## Challenge 15: Meet the Agents

        **Chapter:** [Ch19: Accessibility Agents](https://github.com/Community-Access/git-going-with-github/blob/main/docs/19-accessibility-agents.md)

        **What you will do:** Explore the accessibility-agents repository, discover what agents are available, run one agent, and read one agent's `.agent.md` file to understand how it works.

        ### Instructions

        1. **Discover** -- Browse the [accessibility-agents repository](https://github.com/Community-Access/accessibility-agents) and find at least 3 different agents. Note their names and what they do.
        2. **Run** -- Choose one agent and try it out. This might mean:
           - Using a slash command in GitHub Copilot Chat
           - Invoking an agent through the VS Code command palette
           - Following the usage instructions in the agent's README
        3. **Read** -- Open one agent's `.agent.md` file. Identify:
           - What is the agent's purpose?
           - What are its responsibilities?
           - What are its guardrails (things it should NOT do)?

        ### What to look for in an `.agent.md` file

        Every agent file follows a pattern:
        - **YAML frontmatter** at the top: metadata like name, description, tools
        - **Responsibilities** section: what the agent is designed to do
        - **Guardrails** section: boundaries that keep the agent safe and focused

  - type: textarea
    id: evidence
    attributes:
      label: "Your evidence"
      description: "Name 3 agents you discovered, describe one you ran, and summarize one agent's instructions."
      placeholder: |
        Three agents I found:
        1. ...
        2. ...
        3. ...

        I ran the "___" agent. It did: ...

        I read the "___" agent file. Its purpose is..., its guardrails include...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Peer simulation check

        Compare your agent discoveries with the peer-simulation issue or with a real buddy if you have access. Did you find different agents or different use cases?

        ### If you get stuck

        | Symptom | Try this |
        |---|---|
        | I cannot find the accessibility-agents repo | Go to the Community-Access organization on GitHub and look for the accessibility-agents repository. |
        | I do not know how to run an agent | Look for a README or usage instructions in the agent's folder. Some agents work in Copilot Chat, others in VS Code. |
        | The agent file is confusing | Focus on the YAML frontmatter first, then the section headings. Your Chapter 19 reading explains the format. |
        | I finished but want to check my work | [View the reference solution](https://github.com/Community-Access/git-going-with-github/blob/main/docs/solutions/solution-15-agents.md) |

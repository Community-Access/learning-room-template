name: "Challenge 14: Template Remix"
description: Create a custom issue template by remixing the registration template.
hidden: true
title: "Challenge 14: Template Remix (@{username})"
labels: ["challenge", "day-2", "autograded"]
body:
  - type: markdown
    attributes:
      value: |
        ## Challenge 14: Template Remix

        **Chapter:** [Ch17: Issue Templates](https://github.com/Community-Access/git-going-with-github/blob/main/docs/17-issue-templates.md)

        **What you will do:** Create your own custom issue template by studying the existing registration template and remixing it for a new purpose.

        ### Instructions

        1. Study the sample template at `docs/samples/chapter-15-registration-remix-example.yml` to understand the YAML format.
        2. Create a new file at `.github/ISSUE_TEMPLATE/YOUR-USERNAME-template.yml` on your branch.
        3. Your template must include:
           - A `name` field (required -- the autograder checks for this)
           - A `description` field
           - A `title` field with a prefix pattern
           - At least one `textarea` or `input` field in the `body`
        4. Choose your own topic. Ideas:
           - Accessibility feedback form
           - Workshop improvement suggestion
           - Bug report for a specific tool
           - Feature request with structured fields
        5. Commit and push your template.

        ### Minimum YAML structure

        ```yaml
        name: "Your Template Name"
        description: "One sentence describing when to use this template."
hidden: true
        title: "[PREFIX] "
        labels: ["your-label"]
        body:
          - type: textarea
            id: details
            attributes:
              label: "Details"
              description: "Describe your request."
hidden: true
            validations:
              required: true
        ```

        **Autograded:** The autograder verifies that a YAML file exists in `.github/ISSUE_TEMPLATE/` with a valid `name` field.

  - type: textarea
    id: evidence
    attributes:
      label: "Your evidence"
      description: "Paste the URL of your template file and describe what it is for."
hidden: true
      placeholder: |
        Template file URL: https://github.com/...
        My template is for: ...
        I included these fields: ...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Peer simulation check

        Create a test issue using your own custom template, then compare it with the seeded challenge templates. If you have real buddy access, you may also try your buddy's template.

        ### If you get stuck

        | Symptom | Try this |
        |---|---|
        | YAML syntax error | YAML is sensitive to indentation. Use 2 spaces (not tabs). Check that all colons have a space after them. |
        | The template does not appear in the issue chooser | Make sure the file is in `.github/ISSUE_TEMPLATE/` and has a `.yml` extension. The `name` field must be present. |
        | I do not know what topic to choose | Look at the sample template for inspiration. Any structured form works -- a feedback form, a recipe, a book review. |
        | I finished but want to check my work | [View the reference solution](https://github.com/Community-Access/git-going-with-github/blob/main/docs/solutions/solution-14-template.md) |

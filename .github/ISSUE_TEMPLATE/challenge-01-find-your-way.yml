name: "Challenge 1: Find Your Way Around"
description: Navigate the learning-room repository and find key landmarks.
hidden: true
title: "Challenge 1: Find Your Way Around (@{username})"
labels: ["challenge", "day-1"]
body:
  - type: markdown
    attributes:
      value: |
        ## Challenge 1: Find Your Way Around

        **Chapters:** [Ch02: Understanding GitHub](https://github.com/Community-Access/git-going-with-github/blob/main/docs/02-understanding-github.md) | [Ch03: Navigating Repositories](https://github.com/Community-Access/git-going-with-github/blob/main/docs/03-navigating-repositories.md) | [Ch04: The Learning Room](https://github.com/Community-Access/git-going-with-github/blob/main/docs/04-the-learning-room.md)

        **What you will do:** Explore the learning-room repository like a scavenger hunt. Find the tabs, navigate the file tree, read the README, and locate key files.

        ### Scavenger hunt checklist

        Work through each item. You do not need to complete them in order.

        - [ ] Find the **Code** tab and count how many files are in the root of the repository
        - [ ] Open the **Issues** tab and find an open issue
        - [ ] Navigate to `docs/welcome.md` and read the first paragraph
        - [ ] Find the repository description (hint: it is near the top of the Code tab)
        - [ ] Locate the `README.md` file and identify who this workshop is for
        - [ ] Find the **Settings** information area (About section) on the right side of the Code tab

  - type: textarea
    id: evidence
    attributes:
      label: "Your evidence"
      description: "Paste your scavenger hunt findings below. For each item, write a short sentence about what you found."
hidden: true
      placeholder: |
        1. I found ___ files in the root of the repository.
        2. The open issue I found was titled "___".
        3. The first paragraph of welcome.md says...
        4. The repository description is...
        5. The README says this workshop is for...
        6. The About section shows...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Peer simulation check

        After you submit your evidence, open the **Peer Simulation: Welcome Link Needs Context** issue in this repository and leave an encouraging comment or reaction. If your facilitator gave you access to a real buddy repository, you may use your buddy's issue instead.

        ### If you get stuck

        | Symptom | Try this |
        |---|---|
        | I cannot find the tabs | Look for a horizontal navigation bar below the repository name. Screen reader users: navigate by heading level 2 or use the landmark navigation. |
        | I cannot find `docs/welcome.md` | On the Code tab, look for a folder called `docs`. Select it, then select `welcome.md`. |
        | I am not sure what counts as evidence | Any description of what you found works. There are no wrong answers in a scavenger hunt. |
        | I finished but want to check my work | [View the reference solution](https://github.com/Community-Access/git-going-with-github/blob/main/docs/solutions/solution-01-scavenger-hunt.md) |

name: "Challenge 9: Merge Day"
description: Get your Day 1 PR merged and celebrate.
title: "Challenge 9: Merge Day (@{username})"
labels: ["challenge", "day-1"]
body:
  - type: markdown
    attributes:
      value: |
        ## Challenge 9: Merge Day

        **Chapter:** [Ch10: Notifications and Day 1 Close](https://github.com/Community-Access/git-going-with-github/blob/main/docs/10-notifications-and-day-1-close.md)

        **What you will do:** Get your Day 1 PR merged into main, verify your changes appear, and celebrate completing Day 1.

        ### Merge checklist

        Before merging, verify everything is ready:

        - [ ] Your PR has no merge conflicts (if it does, resolve them first -- see Challenge 7)
        - [ ] Your PR links to your issue with `Closes #XX`
        - [ ] Your commit message is meaningful
        - [ ] You have reviewed your own changes one last time

        ### Instructions

        1. Open your PR on the Pull requests tab.
        2. If all checks pass (green checkmarks), you are ready to merge.
        3. Select **Merge pull request** (your facilitator may handle this step).
        4. After the merge, go to the **Code** tab and verify your changes appear on the `main` branch.
        5. Check that your linked issue was automatically closed.

        ### Day 1 celebration

        You have completed Day 1. Take a moment to appreciate what you accomplished:
        - You navigated a real GitHub repository
        - You filed an issue and had a conversation
        - You created a branch, made changes, and opened a pull request
        - You survived a merge conflict
        - You contributed to an open source community

  - type: textarea
    id: evidence
    attributes:
      label: "Your evidence"
      description: "Confirm your PR was merged and share what you accomplished today."
      placeholder: |
        My PR was merged: [link]
        My issue was automatically closed: [link]
        One thing I am proud of from Day 1: ...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Peer simulation check

        Leave a wrap-up comment on the peer-simulation issue or PR. If you have real buddy access, congratulate your buddy on completing Day 1.

        ### If you get stuck

        | Symptom | Try this |
        |---|---|
        | My PR still has conflicts | Go back to Challenge 7 and resolve them first. |
        | The merge button is disabled | Your facilitator may need to approve the merge, or branch protection rules may require a review. Ask your facilitator. |
        | My issue did not close automatically | Check that your PR description contains `Closes #XX` with the correct issue number. You can edit the PR description and re-merge if needed. |
        | I finished but want to check my work | [View the reference solution](https://github.com/Community-Access/git-going-with-github/blob/main/docs/solutions/solution-09-merge-day.md) |

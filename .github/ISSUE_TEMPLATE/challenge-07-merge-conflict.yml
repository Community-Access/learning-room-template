name: "Challenge 7: Survive a Merge Conflict"
description: Resolve a facilitator-triggered merge conflict.
title: "Challenge 7: Survive a Merge Conflict (@{username})"
labels: ["challenge", "day-1", "autograded"]
body:
  - type: markdown
    attributes:
      value: |
        ## Challenge 7: Survive a Merge Conflict

        **Chapter:** [Ch07: Merge Conflicts](https://github.com/Community-Access/git-going-with-github/blob/main/docs/07-merge-conflicts.md)

        **What you will do:** Your facilitator will trigger a merge conflict in your PR. You will resolve it by editing the file, removing conflict markers, and keeping the right content.

        ### What are conflict markers?

        When Git cannot automatically merge changes, it inserts markers like this:

        ```
        <<<<<<< HEAD
        The version currently on the target branch
        =======
        Your version from your branch
        >>>>>>> learn/your-username
        ```

        Your job: decide what the final version should look like, then **delete all three marker lines** (`<<<<<<<`, `=======`, `>>>>>>>`).

        ### Instructions

        1. Wait for your facilitator to trigger the conflict (they will tell you when).
        2. Open your PR -- you will see a message about conflicts.
        3. Select **Resolve conflicts** (or edit the file directly on your branch).
        4. Find the conflict markers in the file.
        5. Decide which content to keep (or combine both).
        6. Delete all conflict marker lines.
        7. Commit the resolution.

        **Autograded:** The autograder will check that no conflict markers remain in your file and that the file has meaningful content.

  - type: textarea
    id: evidence
    attributes:
      label: "Your evidence"
      description: "Describe the conflict and how you resolved it."
      placeholder: |
        The conflict was in file: ...
        I chose to keep: ...
        I resolved it by: ...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Peer simulation check

        Compare your resolution with the facilitator's conflict seed or with a real buddy if you have access. It is OK if two valid resolutions keep different wording.

        ### If you get stuck

        | Symptom | Try this |
        |---|---|
        | I do not see a conflict | Your facilitator may not have triggered it yet. Wait for their signal. |
        | I cannot find the Resolve conflicts button | Look in the PR conversation tab, near the merge section at the bottom. Screen reader users: search for "Resolve conflicts" button. |
        | I am not sure which content to keep | Read both versions. If both are valuable, combine them. If one is clearly better, keep that one. There is no single right answer. |
        | The autograder still reports conflict markers | Search the file for `<<<<<<<`, `=======`, and `>>>>>>>`. All three types must be completely removed. |
        | I finished but want to check my work | [View the reference solution](https://github.com/Community-Access/git-going-with-github/blob/main/docs/solutions/solution-07-merge-conflict.md) |

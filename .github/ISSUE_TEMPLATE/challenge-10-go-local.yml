name: "Challenge 10: Go Local"
description: Clone the repo, create a branch, edit, commit, and push from your local tool.
title: "Challenge 10: Go Local (@{username})"
labels: ["challenge", "day-2", "autograded"]
body:
  - type: markdown
    attributes:
      value: |
        ## Challenge 10: Go Local

        **Chapters:** [Ch11: VS Code Interface](https://github.com/Community-Access/git-going-with-github/blob/main/docs/11-vscode-interface.md) | [Ch13: How Git Works](https://github.com/Community-Access/git-going-with-github/blob/main/docs/13-how-git-works.md) | [Ch14: Git in Practice](https://github.com/Community-Access/git-going-with-github/blob/main/docs/14-git-in-practice.md)

        **What you will do:** Clone the learning-room to your computer, create a feature branch, make an edit, commit locally, and push to GitHub.

        ### The local workflow

        This is the professional Git workflow you will use for the rest of your career:

        1. **Clone** the repository to your computer
        2. **Branch** -- create a new branch for your work
        3. **Edit** -- make your changes
        4. **Commit** -- save a snapshot locally
        5. **Push** -- send your branch to GitHub

        ### Instructions (choose your tool)

        **VS Code (recommended for Day 2):**
        1. Open VS Code. Open the Command Palette (Ctrl+Shift+P / Cmd+Shift+P).
        2. Type "Git: Clone" and paste the repository URL.
        3. After cloning, create a branch: open the Command Palette, type "Git: Create Branch", name it `fix/YOUR-USERNAME`.
        4. Edit any file in the `docs/` folder (fix a typo, improve a sentence, add a comment).
        5. In the Source Control panel (Ctrl+Shift+G), stage your change, write a commit message, and commit.
        6. Push: open the Command Palette, type "Git: Push".

        **GitHub Desktop:**
        1. File > Clone Repository. Paste the URL.
        2. Branch > New Branch. Name it `fix/YOUR-USERNAME`.
        3. Open the repo folder in your file manager, edit a file.
        4. In GitHub Desktop, write a commit message and commit.
        5. Select "Publish branch" to push.

        **CLI:**
        ```
        git clone <repo-url>
        cd learning-room
        git checkout -b fix/YOUR-USERNAME
        # edit a file
        git add .
        git commit -m "fix: improve docs section"
        git push -u origin fix/YOUR-USERNAME
        ```

        **Autograded:** The autograder verifies that at least one commit exists on a non-default branch pushed from a local tool.

  - type: textarea
    id: evidence
    attributes:
      label: "Your evidence"
      description: "Describe what tool you used, what you edited, and your commit message."
      placeholder: |
        Tool used: VS Code / GitHub Desktop / CLI
        Branch name: fix/myusername
        I edited: ...
        Commit message: "..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Peer simulation check

        Compare your local tool choice with the peer-simulation PR notes or with a real buddy. What was different about the workflow?

        ### If you get stuck

        | Symptom | Try this |
        |---|---|
        | Clone fails with authentication error | See [Appendix D: Git Authentication](https://github.com/Community-Access/git-going-with-github/blob/main/docs/appendix-d-git-authentication.md) for setup help. |
        | Push fails with permission denied | Make sure you have write access to the repository. Ask your facilitator. |
        | I am not sure what to edit | Fix any typo, improve any sentence, or add a helpful comment. The content of the change matters less than the workflow. |
        | VS Code does not show the Source Control panel | Press Ctrl+Shift+G (Cmd+Shift+G on Mac). Make sure you opened the cloned folder as a workspace. |
        | I finished but want to check my work | [View the reference solution](https://github.com/Community-Access/git-going-with-github/blob/main/docs/solutions/solution-10-go-local.md) |

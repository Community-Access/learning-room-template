name: "Challenge 11: Open a Day 2 PR"
description: Open a PR from your locally-pushed branch.
title: "Challenge 11: Open a Day 2 PR (@{username})"
labels: ["challenge", "day-2"]
body:
  - type: markdown
    attributes:
      value: |
        ## Challenge 11: Open a Day 2 PR

        **Chapters:** [Ch14: Git in Practice](https://github.com/Community-Access/git-going-with-github/blob/main/docs/14-git-in-practice.md) | [Ch15: Code Review](https://github.com/Community-Access/git-going-with-github/blob/main/docs/15-code-review.md)

        **What you will do:** Open a pull request from the branch you pushed in Challenge 10. Notice that the workflow is the same as Day 1 -- the only difference is where the commits came from.

        ### Instructions

        1. Go to the learning-room repository on GitHub.com.
        2. You may see a banner saying your branch had recent pushes -- select **Compare & pull request** if it appears.
        3. Or go to Pull requests > New pull request, set base to `main` and compare to `fix/YOUR-USERNAME`.
        4. Write a clear PR title and description.
        5. Include `Closes #XX` if this PR addresses an existing issue.
        6. Submit the pull request.

        ### The pattern is the same

        Notice what you just did:
        - **Day 1:** Edit on GitHub.com > commit > open PR
        - **Day 2:** Edit locally > commit > push > open PR

        The pull request step is identical. The only change is where you made the edits. This is the core Git workflow pattern.

  - type: textarea
    id: evidence
    attributes:
      label: "Your evidence"
      description: "Paste the URL of your Day 2 PR and describe the pattern you noticed."
      placeholder: |
        PR URL: https://github.com/...
        The pattern I noticed: ...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Peer simulation check

        Review the peer-simulation PR title and description. Is it clear what changed? If you have real buddy access, review your buddy's PR too.

        ### If you get stuck

        | Symptom | Try this |
        |---|---|
        | I do not see my branch | Make sure you pushed it in Challenge 10. Run `git push -u origin fix/YOUR-USERNAME` from your local tool. |
        | It says there is nothing to compare | Your branch may not have any new commits. Make sure you committed and pushed at least one change. |
        | I do not know what to write in the description | Use the same template from Challenge 6. Describe what you changed and why. |
        | I finished but want to check my work | [View the reference solution](https://github.com/Community-Access/git-going-with-github/blob/main/docs/solutions/solution-11-day2-pr.md) |

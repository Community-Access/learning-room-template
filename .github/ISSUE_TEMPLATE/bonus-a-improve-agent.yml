name: "Bonus A: Improve an Existing Agent"
description: Fork an agent, make a meaningful improvement, and open a PR.
title: "Bonus: Improve an Existing Agent (@{username})"
labels: ["challenge", "bonus"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bonus A: Improve an Existing Agent

        **For students who:** Finish early and want to contribute more to the accessibility-agents ecosystem.

        **What you will do:** Choose an existing agent in the accessibility-agents repository, identify something that could be better, and open a PR with your improvement.

        ### Instructions

        1. Browse the agents in the [accessibility-agents repository](https://github.com/Community-Access/accessibility-agents).
        2. Pick one that interests you and read its `.agent.md` file carefully.
        3. Identify an improvement. Ideas:
           - Add a missing guardrail
           - Clarify a responsibility that is vague
           - Fix a typo or improve the description
           - Add a new responsibility that fits the agent's purpose
        4. Make the change on your fork (you already forked this in Challenge 16).
        5. Open a pull request explaining what you improved and why.

        ### Improvement criteria

        Good improvements are:
        - **Specific** -- change one thing well, not many things vaguely
        - **Justified** -- explain WHY the change makes the agent better
        - **Respectful** -- the original author made choices for reasons. Improve, do not rewrite.

  - type: textarea
    id: evidence
    attributes:
      label: "Your evidence"
      description: "Describe the agent you improved, what you changed, and link your PR."
      placeholder: |
        Agent I improved: ...
        What I changed: ...
        Why this is an improvement: ...
        PR URL: https://github.com/...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### If you get stuck

        | Symptom | Try this |
        |---|---|
        | Every agent looks perfect | No agent is perfect. Try reading one with fresh eyes, or compare against the peer-simulation review prompts. |
        | I am not sure my change is an improvement | If you can explain why it helps, it is an improvement. When in doubt, err on the side of clarity. |
        | I want to check my work | [View the reference solution](https://github.com/Community-Access/git-going-with-github/blob/main/docs/solutions/solution-bonus-a.md) |

name: "Challenge 16: Build Your Agent (Capstone)"
description: Fork the accessibility-agents repo, write an agent, and open a cross-fork PR.
title: "Challenge 16: Build Your Agent (@{username})"
labels: ["challenge", "day-2", "autograded", "capstone"]
body:
  - type: markdown
    attributes:
      value: |
        ## Challenge 16: Build Your Agent (Capstone)

        **Chapters:** [Ch18: Fork and Contribute](https://github.com/Community-Access/git-going-with-github/blob/main/docs/18-fork-and-contribute.md) | [Ch20: Build Your Agent](https://github.com/Community-Access/git-going-with-github/blob/main/docs/20-build-your-agent.md)

        **What you will do:** This is the capstone project. You will fork the accessibility-agents repository, write your own agent file, open a cross-fork pull request, and review a peer or facilitator-seeded agent.

        ### Phase 1: Fork

        1. Go to the [accessibility-agents repository](https://github.com/Community-Access/accessibility-agents).
        2. Select **Fork** to create your own copy.
        3. Clone your fork to your local machine.

        ### Phase 2: Branch

        4. Create a branch named `agent/YOUR-USERNAME` for your work.

        ### Phase 3: Write your agent

        5. Create a new file: `agents/YOUR-AGENT-NAME.agent.md`
        6. Your agent file must include:
           - **Valid YAML frontmatter** with `name`, `description`, and at least one `tools` entry
           - **Responsibilities section** -- 3-5 bullet points describing what your agent does
           - **Guardrails section** -- 2-3 bullet points describing what your agent should NOT do

        Use this template to get started:

        ```markdown
        ---
        name: "Your Agent Name"
        description: "One sentence describing what your agent does."
        tools: ["codebase"]
        ---

        # Your Agent Name

        ## Responsibilities

        - Responsibility 1
        - Responsibility 2
        - Responsibility 3

        ## Guardrails

        - Never do X
        - Always verify Y before Z
        ```

        ### Phase 4: Open a cross-fork PR

        7. Commit your agent file and push to your fork.
        8. Go to the **original** accessibility-agents repository.
        9. Open a pull request from your fork's branch to the original repo's `main` branch.
        10. Write a PR description that explains your agent's purpose.

        ### Phase 5: Peer review

        11. Review a classmate's capstone PR if facilitator access is available. If not, review the peer-simulation PR and explain what you would look for in an agent PR.
        12. Check: Does their agent have responsibilities? Guardrails? Valid YAML?

        **Autograded:** The autograder verifies that your agent file exists, has valid YAML frontmatter, and contains both responsibilities and guardrails sections.

  - type: textarea
    id: evidence
    attributes:
      label: "Your evidence"
      description: "Share your fork URL, PR URL, and describe your agent."
      placeholder: |
        My fork: https://github.com/YOUR-USERNAME/accessibility-agents
        My PR: https://github.com/Community-Access/accessibility-agents/pull/...
        My agent name: ...
        What it does: ...
        One guardrail: ...
        I reviewed a peer or peer-simulation PR because: ...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Peer simulation check

        Review a peer agent if access is available. If not, use the peer-simulation PR to practice review language, then describe what you would check in an agent PR.

        ### If you get stuck

        | Symptom | Try this |
        |---|---|
        | I do not know what agent to build | Think about a task you do repeatedly that could be automated. Or look at the existing agents for inspiration. |
        | YAML frontmatter is invalid | Make sure the `---` delimiters are on their own lines, and that all keys use proper YAML syntax (colons followed by spaces). |
        | I cannot open a PR to the original repo | Make sure you pushed to YOUR fork first, then go to the original repo and GitHub will offer to create a PR from your fork. |
        | The autograder fails | Check that your file has `.agent.md` extension, valid YAML frontmatter with a `name` field, and sections titled "Responsibilities" and "Guardrails". |
        | I finished but want to check my work | [View the reference solution](https://github.com/Community-Access/git-going-with-github/blob/main/docs/solutions/solution-16-capstone.md) |

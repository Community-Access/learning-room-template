name: "Challenge 8: The Culture Layer"
description: Reflect on open source culture and triage an issue with labels.
hidden: true
title: "Challenge 8: The Culture Layer (@{username})"
labels: ["challenge", "day-1"]
body:
  - type: markdown
    attributes:
      value: |
        ## Challenge 8: The Culture Layer

        **Chapter:** [Ch08: Open Source Culture](https://github.com/Community-Access/git-going-with-github/blob/main/docs/08-open-source-culture.md)

        **What you will do:** Reflect on what makes open source communities welcoming, then practice triaging an issue by adding labels.

        ### Part 1: Reflection

        Think about your experience so far in this workshop. Answer one or more of these questions:

        - What made you feel welcome when you arrived?
        - What would make the learning-room more accessible or inclusive?
        - What is one thing you learned from a peer-simulation issue, PR, or classmate today?

        ### Part 2: Triage an issue

        1. Go to the **Issues** tab and find an open issue. The `peer-simulation` issue is a good choice; if you have real buddy access, you may use a classmate's issue.
        2. Add at least one **label** that describes the issue. Some options:
           - `bug` -- something is broken
           - `enhancement` -- a suggestion for improvement
           - `documentation` -- related to docs
           - `good first issue` -- easy for newcomers
        3. If you think the issue needs a specific person's attention, leave a comment tagging them.

  - type: textarea
    id: evidence
    attributes:
      label: "Your evidence"
      description: "Share your reflection and describe which issue you triaged and what label you added."
hidden: true
      placeholder: |
        Reflection: ...

        I triaged issue #XX by adding the label "___".
        I chose that label because...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### Peer simulation check

        Share your reflection in the peer-simulation issue or with your buddy if you have one. Different perspectives make the community richer.

        ### If you get stuck

        | Symptom | Try this |
        |---|---|
        | I do not see any labels | You may need to create them. On the Issues tab, look for the Labels link (next to Milestones). Or ask your facilitator to set up default labels. |
        | I cannot add a label to someone else's issue | You may need collaborator permissions. Ask your facilitator if labels are not available. |
        | I do not know what to reflect on | Start with the simplest question: "What is one thing I learned today?" There are no wrong answers. |
        | I finished but want to check my work | [View the reference solution](https://github.com/Community-Access/git-going-with-github/blob/main/docs/solutions/solution-08-culture.md) |

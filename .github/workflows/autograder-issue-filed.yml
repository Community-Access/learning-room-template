name: "Challenge 2: Issue Filed Check"
# Validates that the student has filed at least one issue in their Learning Room.
# Replaces the GitHub Classroom autograding "test case" for Challenge 2 so the
# check still runs even when the Classroom UI cannot save test cases.

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  acknowledge-issue:
    name: Acknowledge first issue
    runs-on: ubuntu-latest
    # Only react when the author is the student (not a bot or facilitator
    # pre-seeded issue), and never grade seeded workshop artifacts: peer
    # simulation issues, challenge issues, and the onboarding roadmap are
    # created by automation or facilitators, not Challenge 2 submissions.
    if: >-
      github.event_name == 'workflow_dispatch' || (
        github.event.issue.user.login == github.actor &&
        github.event.issue.user.type == 'User' &&
        !startsWith(github.event.issue.title, 'Peer Simulation:') &&
        !startsWith(github.event.issue.title, 'Challenge ') &&
        !startsWith(github.event.issue.title, 'Start Here:')
      )

    steps:
      - name: Count issues authored by this student
        id: count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --author "$GITHUB_ACTOR" \
            --state all \
            --json number \
            --jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Post acknowledgement
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = (issue.title || '').trim();
            const bodyText = (issue.body || '').trim();
            const genericTitlePattern = /^(fix|bug|update|todo|fix\s+todo|update\s+file)$/i;
            const hasSpecificTitle = title.length >= 12 && !genericTitlePattern.test(title);

            const hasWhatLine = /^\s*what\s*:/im.test(bodyText);
            const hasWhereLine = /^\s*where\s*:/im.test(bodyText);
            const hasWhyLine = /^\s*why\s*:/im.test(bodyText);
            const hasFileReference = /\bdocs\/welcome\.md\b/i.test(bodyText);
            const hasTodoReference = /\bTODO\b/i.test(bodyText);

            const missing = [];
            if (!hasSpecificTitle) {
              missing.push('Use a specific, descriptive title (not generic like "Bug" or "Fix TODO").');
            }
            if (!hasWhatLine) {
              missing.push('Add a `What:` line describing what must change.');
            }
            if (!hasWhereLine) {
              missing.push('Add a `Where:` line that includes `docs/welcome.md`.');
            }
            if (!hasWhyLine) {
              missing.push('Add a `Why:` line explaining why the change matters.');
            }
            if (!hasFileReference) {
              missing.push('Reference `docs/welcome.md` in the issue description.');
            }
            if (!hasTodoReference) {
              missing.push('Mention the `TODO` you found in `docs/welcome.md`.');
            }

            const passesInstructionCheck = missing.length === 0;
            const count = parseInt('${{ steps.count.outputs.count }}', 10);
            const isFirst = count === 1;
            const body = passesInstructionCheck
              ? (isFirst
              ? [
                  '## Challenge 2: First issue filed!',
                  '',
                  'Nice work -- this is the first issue you have opened in your Learning Room. ',
                  'Filing issues is how contributors describe work that needs to happen.',
                  '',
                  'Next up: try @mentioning a teammate or `@gandalf-bot` in a comment (Challenge 3), ',
                  'then move on to branching and committing.',
                  '',
                  'See [Chapter 5: Working with Issues](https://github.com/Community-Access/git-going-with-github/blob/main/docs/05-working-with-issues.md).'
                ].join('\n')
              : [
                  '## Challenge 2: Another issue filed',
                  '',
                  'You have now filed ' + count + ' issues in this Learning Room. Keep going!'
                ].join('\n'))
              : [
                  '## Challenge 2: Needs revision',
                  '',
                  'Thanks for filing an issue. To complete Challenge 2, update this issue so it follows the required format:',
                  '',
                  '- Use a specific title (not generic).',
                  '- Include lines for `What:`, `Where:`, and `Why:`.',
                  '- Mention `docs/welcome.md` and the `TODO` you found.',
                  '',
                  '### Missing items',
                  ...missing.map(item => '- ' + item),
                  '',
                  'After editing the issue, your facilitator can re-run the Challenge 2 check from Actions.'
                ].join('\n');
            const MARKER = '## Challenge 2:';
            try {
              const labelsToAdd = passesInstructionCheck ? ['challenge-2-complete'] : ['challenge-2-needs-revision'];
              const labelsToRemove = passesInstructionCheck ? ['challenge-2-needs-revision'] : ['challenge-2-complete'];

              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: labelsToAdd
                });
              } catch (labelErr) {
                console.log('Could not add Challenge 2 status label:', labelErr.message);
              }

              for (const labelName of labelsToRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    name: labelName
                  });
                } catch (removeErr) {
                  // Ignore when label does not exist yet.
                  console.log('Label remove skipped:', removeErr.message);
                }
              }

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });
              const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(MARKER));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body
                });
              }
            } catch (error) {
              console.error('Could not post Challenge 2 acknowledgement:', error.message);
            }

      - name: Post workflow error notice
        if: failure() && github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '## Challenge 2:';
            const body = [
              '## Challenge 2: Check could not complete',
              '',
              'The automated issue check ran into an unexpected error. Your work is not affected.',
              'Keep going and ask your facilitator, or mention @facilitator in a comment.',
              '',
              '---',
              '*Automated message from Learning Room Bot.*'
            ].join('\n');
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            } catch (err) {
              console.error('Could not post error notice:', err.message);
            }

name: "Challenge 5: Branch Commit Check"
# Validates that the student has at least one commit on a non-default branch.
# Replaces the GitHub Classroom autograding "test case" for Challenge 5 so the
# check still runs even when the Classroom UI cannot save test cases.

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-commit-on-branch:
    name: Verify commit on non-default branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inspect branch and commits
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.head_ref }}"
            COMMITS=$(git log --oneline origin/main..HEAD | wc -l)
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            COMMITS=$(git log --oneline origin/main..HEAD 2>/dev/null | wc -l || echo 0)
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "count=$COMMITS" >> "$GITHUB_OUTPUT"
          if [ "$BRANCH" = "main" ]; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const onMain = '${{ steps.check.outputs.on_main }}' === 'true';
            const count = parseInt('${{ steps.check.outputs.count }}', 10);
            const branch = '${{ steps.check.outputs.branch }}';
            let body;
            if (onMain) {
              body = [
                '## Challenge 5: PR is from the main branch',
                '',
                'This challenge asks you to create a **feature branch** and commit your edit there. ',
                'Your PR appears to come from main itself.',
                '',
                'See [Chapter 4: The Learning Room](https://github.com/Community-Access/git-going-with-github/blob/main/docs/04-the-learning-room.md) for branching instructions.'
              ].join('\n');
            } else if (count === 0) {
              body = [
                '## Challenge 5: No new commits on this branch',
                '',
                'Branch `' + branch + '` has no commits ahead of main. ',
                'Edit a file, commit with a clear message, and push again.'
              ].join('\n');
            } else {
              body = [
                '## Challenge 5: Branch commit verified!',
                '',
                'Found ' + count + ' commit(s) on branch `' + branch + '`. ',
                'You committed your work on a feature branch -- exactly the workflow real contributors use.'
              ].join('\n');
            }
            const MARKER = '## Challenge 5:';
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });
              const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(MARKER));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body
                });
              }
            } catch (error) {
              console.error('Could not post Challenge 5 result:', error.message);
            }

      - name: Post workflow error notice
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '## Challenge 5:';
            const body = [
              '## Challenge 5: Check could not complete',
              '',
              'The automated branch commit check ran into an unexpected error. Your work is not affected.',
              'Keep going and ask your facilitator, or mention @facilitator in a comment.',
              '',
              '---',
              '*Automated message from Learning Room Bot.*'
            ].join('\n');
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            } catch (err) {
              console.error('Could not post error notice:', err.message);
            }

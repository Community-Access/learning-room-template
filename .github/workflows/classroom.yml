name: Autograding Tests
on:
  - push
  - workflow_dispatch
  - repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Challenge 10 Go Local Commit on Branch
        id: challenge-10-commit-on-branch
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Challenge 10 Go Local Commit on Branch
          setup-command: ""
          command: git log --oneline origin/main..HEAD 2>/dev/null | head -1 | grep -q '.' || git branch -r --list 'origin/*' | grep -v main | head -1 | xargs -I{} git log --oneline origin/main..{} | head -1 | grep -q '.'
          timeout: 10
          max-score: 15
      - name: Challenge 14 Custom Issue Template Exists
        id: challenge-14-custom-template-exists
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Challenge 14 Custom Issue Template Exists
          setup-command: ""
          command: find .github/ISSUE_TEMPLATE -name '*.yml' ! -name 'challenge-*.yml' ! -name 'bonus-*.yml' ! -name 'config.yml' 2>/dev/null | head -1 | grep -q '.'
          timeout: 10
          max-score: 15
      - name: Challenge 14 Template Has Required Fields
        id: challenge-14-template-required-fields
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Challenge 14 Template Has Required Fields
          setup-command: ""
          command: TEMPLATE=$(find .github/ISSUE_TEMPLATE -name '*.yml' ! -name 'challenge-*.yml' ! -name 'bonus-*.yml' ! -name 'config.yml' 2>/dev/null | head -1); grep -q '^name:' "$TEMPLATE" && grep -q '^description:' "$TEMPLATE"
          timeout: 10
          max-score: 10
      - name: Challenge 16 Agent File Exists
        id: challenge-16-agent-file-exists
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Challenge 16 Agent File Exists
          setup-command: ""
          command: find agents community-agents -name '*.md' 2>/dev/null | head -1 | grep -q '.'
          timeout: 10
          max-score: 10
      - name: Challenge 16 Agent Has Frontmatter
        id: challenge-16-agent-frontmatter
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Challenge 16 Agent Has Frontmatter
          setup-command: ""
          command: AGENT=$(find agents community-agents -name '*.md' 2>/dev/null | head -1); head -1 "$AGENT" | grep -q '^---'
          timeout: 10
          max-score: 10
      - name: Challenge 16 Agent Has Responsibilities and Guardrails
        id: challenge-16-agent-responsibilities-guardrails
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Challenge 16 Agent Has Responsibilities and Guardrails
          setup-command: ""
          command: AGENT=$(find agents community-agents -name '*.md' 2>/dev/null | head -1); grep -qi '## responsibilities\|## what this agent does' "$AGENT" && grep -qi '## guardrails\|## limitations\|## boundaries' "$AGENT"
          timeout: 10
          max-score: 15
      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CHALLENGE-10-COMMIT-ON-BRANCH_RESULTS: "${{steps.challenge-10-commit-on-branch.outputs.result}}"
          CHALLENGE-14-CUSTOM-TEMPLATE-EXISTS_RESULTS: "${{steps.challenge-14-custom-template-exists.outputs.result}}"
          CHALLENGE-14-TEMPLATE-REQUIRED-FIELDS_RESULTS: "${{steps.challenge-14-template-required-fields.outputs.result}}"
          CHALLENGE-16-AGENT-FILE-EXISTS_RESULTS: "${{steps.challenge-16-agent-file-exists.outputs.result}}"
          CHALLENGE-16-AGENT-FRONTMATTER_RESULTS: "${{steps.challenge-16-agent-frontmatter.outputs.result}}"
          CHALLENGE-16-AGENT-RESPONSIBILITIES-GUARDRAILS_RESULTS: "${{steps.challenge-16-agent-responsibilities-guardrails.outputs.result}}"
        with:
          runners: challenge-10-commit-on-branch,challenge-14-custom-template-exists,challenge-14-template-required-fields,challenge-16-agent-file-exists,challenge-16-agent-frontmatter,challenge-16-agent-responsibilities-guardrails
          